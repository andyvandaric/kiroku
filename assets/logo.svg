<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#1a1a2e"/>
  <circle cx="256" cy="256" r="248" stroke="#7b2ff7" stroke-width="4" fill="none"/>

  <!-- Ninja mask/head -->
  <path d="M130 150 Q256 100 382 150 L382 200 Q256 160 130 200 Z" fill="#2d2d4e"/>
  <!-- Mask band -->
  <rect x="115" y="165" width="282" height="38" rx="19" fill="#4a5568"/>
  <!-- Band tail flowing right -->
  <path d="M397 168 Q430 162 460 182 Q440 195 410 192 L397 206 Z" fill="#4a5568" opacity="0.8"/>
  <path d="M397 175 Q425 170 445 188 Q430 198 405 195" fill="#4a5568" opacity="0.5"/>

  <!-- Eyes (sharp ninja eyes) -->
  <path d="M175 182 L210 173 L222 182 L210 191 L175 182 Z" fill="#7b2ff7"/>
  <path d="M290 182 L325 173 L337 182 L325 191 L290 182 Z" fill="#7b2ff7"/>
  <!-- Eye glow -->
  <circle cx="198" cy="182" r="5" fill="#a855f7"/>
  <circle cx="313" cy="182" r="5" fill="#a855f7"/>

  <!-- Forking paths -->
  <!-- Center path -->
  <line x1="256" y1="235" x2="256" y2="330" stroke="#7b2ff7" stroke-width="4" stroke-linecap="round"/>
  <!-- Left fork - from origin to left node -->
  <path d="M256 265 Q220 290 165 320" stroke="#f0c040" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Right fork - from origin to right node -->
  <path d="M256 265 Q292 290 347 320" stroke="#f0c040" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Far left fork - branches from left node to far-left node -->
  <path d="M165 320 Q148 328 125 335" stroke="#f0c040" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Far right fork - branches from right node to far-right node -->
  <path d="M347 320 Q364 328 387 335" stroke="#f0c040" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Route nodes -->
  <circle cx="165" cy="320" r="11" fill="#f0c040"/>
  <circle cx="256" cy="330" r="11" fill="#7b2ff7"/>
  <circle cx="347" cy="320" r="11" fill="#f0c040"/>
  <circle cx="125" cy="335" r="8" fill="#f0c040" opacity="0.7"/>
  <circle cx="387" cy="335" r="8" fill="#f0c040" opacity="0.7"/>

  <!-- Origin node -->
  <circle cx="256" cy="235" r="9" fill="#e2e8f0"/>

  <!-- Shuriken accent (top-right) -->
  <g transform="translate(400, 95) rotate(15)">
    <path d="M0 -14 L5 0 L0 14 L-5 0 Z" fill="#7b2ff7" opacity="0.5"/>
    <path d="M-14 0 L0 -5 L14 0 L0 5 Z" fill="#7b2ff7" opacity="0.5"/>
    <circle cx="0" cy="0" r="3.5" fill="#a855f7" opacity="0.6"/>
  </g>

  <!-- Text: KIROKU -->
  <text x="256" y="400" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="10" fill="#e2e8f0">KIROKU</text>
  <!-- Subtitle -->
  <text x="256" y="430" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#4a5568" letter-spacing="3">路 MULTI-PROVIDER ROUTER</text>
</svg>
